<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=11">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <title>Drama Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        #start-btn {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 16px;
            border: 1px solid #ccc;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <button id="start-btn">Start Drama</button>
    <div id="result"></div>

    <script>
        (function () {
            var btn = document.getElementById('start-btn');
            var resultDiv = document.getElementById('result');

            function handleClick() {
                var xhr;
                try {
                    xhr = new XMLHttpRequest();
                } catch (e) {
                    try {
                        xhr = new ActiveXObject('Msxml2.XMLHTTP');
                    } catch (e2) {
                        xhr = new ActiveXObject('Microsoft.XMLHTTP');
                    }
                }
                xhr.open('GET', 'https://emeaie.azurewebsites.net/perf/default.aspx', false);
                xhr.send(null);
                if (xhr.status === 200) {
                    resultDiv.innerHTML = xhr.responseText;
                } else {
                    resultDiv.innerHTML = 'Error: ' + xhr.status + ' ' + xhr.statusText;
                }
            }

            if (btn.addEventListener) {
                btn.addEventListener('click', handleClick, false);
            } else if (btn.attachEvent) {
                btn.attachEvent('onclick', handleClick);
            }
        })();
    </script>
</body>
</html>
